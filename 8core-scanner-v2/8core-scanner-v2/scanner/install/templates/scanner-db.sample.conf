#
# Ovo je predložak (sample) za root DB konfiguraciju.
# Pravi scanner-db.conf generira installer ili se kreira ručno.
#
# Lokacija na serveru: ${ROOT_ENGINE_PATH}/scanner-db.conf
# Dozvole:             chmod 600 scanner-db.conf
# Vlasnik:             root

# ── Baza podataka ──────────────────────────────────────────────────────────
DB_HOST="localhost"
DB_NAME="ime_baze"
DB_USER="korisnik_baze"
DB_PASS="lozinka_baze"
DB_CHARSET="utf8mb4"

# ── Putanje enginea ────────────────────────────────────────────────────────
ROOT_ENGINE_PATH="/root/8core_scanner"
QUARANTINE_BASE_PATH="/home/8core_quarantine"
LOG_PATH="/root/8core_scanner/logs"

# ── Web panel korisnik/grupa (za read-only pristup karanteni) ──────────────
# Postavi ako web panel treba čitati karantenu (preview, ignore hash).
# Worker će postaviti group-readable dozvole (750/640) umjesto 700/600.
# Ostaviti prazno ako nije potrebno.
WEB_PANEL_USER='8core5'
WEB_PANEL_GROUP='8core5'
